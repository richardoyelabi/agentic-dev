name: code_analyzer_qa
description: "Reviews code snapshot for completeness and accuracy of the inventory"
team: onboarding
claude:
  model: sonnet
  permission_mode: plan
  allowed_tools: [Read, Glob, Grep]
  max_turns: 10
  max_budget_usd: 1.00
prompt_template: code_analyzer_qa.md.j2
input_documents: [code_snapshot]
output_documents: [code_analyzer_qa_report]
qa_agent: null
constraints:
  - "Evaluate: does the snapshot include all endpoints, models, components, and routes?"
  - "Evaluate: are file paths accurate and pointing to real files?"
  - "Check for missed directories or modules"
  - "Check that the inventory format is structured and parseable"

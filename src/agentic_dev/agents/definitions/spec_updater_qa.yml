name: spec_updater_qa
description: "Reviews updated spec for consistency, no information loss, and correct drift resolution"
team: onboarding
claude:
  model: sonnet
  permission_mode: plan
  allowed_tools: [Read, Glob, Grep]
  max_turns: 10
  max_budget_usd: 1.00
prompt_template: spec_updater_qa.md.j2
input_documents: [original_spec, updated_spec, resolved_items]
output_documents: [spec_updater_qa_report]
qa_agent: null
constraints:
  - "Evaluate: are all drift items correctly incorporated?"
  - "Evaluate: is existing content preserved where not affected by drift?"
  - "Check for broken ID sequences or cross-references"
  - "Check that formatting and conventions are maintained"
  - "Check for unintended removals or modifications"

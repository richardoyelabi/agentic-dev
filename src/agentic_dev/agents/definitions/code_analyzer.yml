name: code_analyzer
description: "Produces a structured snapshot of current code state for drift comparison"
team: onboarding
claude:
  model: sonnet
  permission_mode: plan
  allowed_tools: [Read, Glob, Grep]
  max_turns: 30
  max_budget_usd: 1.00
prompt_template: code_analyzer.md.j2
input_documents: []
output_documents: []
qa_agent: code_analyzer_qa
constraints:
  - "Produce a structured inventory, not a full spec"
  - "List endpoints, data models, components, and routes"
  - "Include file paths for each discovered item"
  - "Do not interpret or recommend, only report what exists"

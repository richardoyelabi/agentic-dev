name: spec_reverse_engineer
description: "Reads existing code and produces a spec document matching the pipeline format"
team: onboarding
claude:
  model: opus
  permission_mode: plan
  allowed_tools: [Read, Glob, Grep, WebSearch]
  max_turns: 80
  max_budget_usd: 15.00
prompt_template: spec_reverse_engineer.md.j2
input_documents: []
output_documents: []
qa_agent: spec_reverse_engineer_qa
constraints:
  - "Produce specs in the exact format the Architect agent uses"
  - "Use ID conventions: [P001] for pages, [M001] for models, [E001] for endpoints, [S001] for services, [C001] for components"
  - "Include all required sections even if empty"
  - "Use document markers: <!-- DOCUMENT: name --> when producing multi-document output"

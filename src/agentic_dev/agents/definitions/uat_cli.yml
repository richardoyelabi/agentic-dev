name: uat_cli
description: "Runtime-drives a CLI via subprocess invocations to verify every acceptance criterion"
team: qa
claude:
  model: opus
  permission_mode: bypassPermissions
  allowed_tools: [Read, Glob, Grep, Bash, WebFetch]
prompt_template: uat_cli.md.j2
input_documents: [features_request, frontend_spec, backend_spec, api_contract, sprint_plan, uat_prereqs]
output_documents: [uat_report]
qa_agent: uat_qa
constraints:
  - "Test every acceptance criterion from the features request"
  - "Invoke the CLI via Bash subprocess; assert on stdout, stderr, exit code, and post-run filesystem side effects"
  - "Capture stdout/stderr transcripts under the engine-provided evidence directory shown in Runtime Verification (do not invent a subdirectory)"
  - "Run commands in non-interactive mode — no prompts"
  - "Include pass/fail status and concrete evidence per AC; vague language will be flagged"

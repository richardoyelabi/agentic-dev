name: feature_extractor
description: "Reads specs and code to extract features with acceptance criteria"
team: onboarding
claude:
  model: opus
  permission_mode: plan
  allowed_tools: [Read, Glob, Grep]
  max_turns: 50
  max_budget_usd: 5.00
prompt_template: feature_extractor.md.j2
input_documents: []
output_documents: [features]
qa_agent: feature_extractor_qa
constraints:
  - "Use [EXISTING-F001] ID format for all features"
  - "Every feature must have Description, Acceptance Criteria, Dependencies, and Priority sections"
  - "Acceptance criteria must be specific and testable"
  - "Derive criteria from what the code actually does"

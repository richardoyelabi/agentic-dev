name: backend_developer
description: "Implements backend code per sprint using the backend spec and API contract"
team: backend
claude:
  model: sonnet
  permission_mode: bypassPermissions
  allowed_tools: [Bash, Read, Edit, Write, Glob, Grep, WebFetch, WebSearch]
  max_budget_usd: 5.00
prompt_template: backend_developer.md.j2
input_documents: [backend_spec, api_contract, sprint_plan]
output_documents: []
working_directory: backend
qa_agent: backend_qa
constraints:
  - "Implement only the features scoped to the current sprint"
  - "Follow the tech stack from the backend spec"
  - "Write tests for all endpoints and services"
  - "Maintain GitHub Actions CI/CD pipeline"

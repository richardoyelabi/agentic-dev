name: uat_web
description: "Runtime-drives a web frontend via Playwright MCP to verify every acceptance criterion end-to-end"
team: qa
claude:
  model: opus
  permission_mode: bypassPermissions
  allowed_tools:
    - Read
    - Glob
    - Grep
    - Bash
    - WebFetch
    - "mcp__plugin_playwright_playwright__*"
prompt_template: uat_web.md.j2
input_documents: [features_request, frontend_spec, backend_spec, api_contract, sprint_plan, uat_prereqs]
output_documents: [uat_report]
qa_agent: uat_qa
constraints:
  - "Test every acceptance criterion from the features request"
  - "Drive flows in a real browser via Playwright MCP — navigate, click, fill, assert"
  - "Capture screenshots and console/network transcripts under the engine-provided evidence directory shown in Runtime Verification (do not invent a subdirectory)"
  - "Start backend (if present) and frontend dev server before driving"
  - "Include pass/fail status and concrete evidence per AC; vague language will be flagged"

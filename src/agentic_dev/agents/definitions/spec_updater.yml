name: spec_updater
description: "Surgically updates a spec document based on resolved drift items"
team: onboarding
claude:
  model: sonnet
  permission_mode: plan
  allowed_tools: [Read, Glob, Grep]
  max_turns: 30
  max_budget_usd: 1.00
prompt_template: spec_updater.md.j2
input_documents: []
output_documents: []
qa_agent: null
constraints:
  - "Make targeted edits, do not regenerate the entire spec"
  - "Preserve existing formatting and conventions"
  - "Maintain ID sequences and cross-references"
  - "Output the complete updated spec document"

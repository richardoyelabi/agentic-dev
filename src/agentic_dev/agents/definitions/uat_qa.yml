name: uat_qa
description: "Meta-reviews UAT report for thoroughness, accuracy, and coverage of all acceptance criteria"
team: qa
claude:
  model: opus
  permission_mode: bypassPermissions
  allowed_tools: [Read, Glob, Grep]
prompt_template: uat_qa.md.j2
input_documents: [features_request, uat_report]
output_documents: [uat_qa_report]
qa_agent: null
constraints:
  - "Evaluate: does the UAT report test every acceptance criterion from the features?"
  - "Evaluate: are PASS verdicts supported by concrete driver-specific evidence (screenshots, transcripts, run logs)?"
  - "Flag false-PASS sentinels: runtime mode without artifacts; Driver=none with overall PASS in uat_mode: full"
  - "Check for missing acceptance criteria not covered by the report"
  - "Check that cross-feature interactions were tested"
  - "Spot-check artifact paths actually exist under the engine-provided evidence directory shown in Spot-Check Instructions"

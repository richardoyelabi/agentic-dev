name: drift_detector
description: "Compares code snapshots against specs to produce a drift report"
team: onboarding
claude:
  model: opus
  permission_mode: plan
  allowed_tools: [Read, Glob, Grep]
  max_turns: 40
  max_budget_usd: 5.00
prompt_template: drift_detector.md.j2
input_documents: []
output_documents: []
qa_agent: drift_detector_qa
constraints:
  - "Assign sequential [DRIFT-nnn] IDs to each item"
  - "Categorize each item: in_code_not_spec, in_spec_not_code, difference, design_drift"
  - "Include file paths and spec references for each item"
  - "Do not suggest resolutions, only report drift"

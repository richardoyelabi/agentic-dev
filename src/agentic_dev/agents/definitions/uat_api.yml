name: uat_api
description: "Runtime-drives a backend-only HTTP API via curl/httpx to verify every acceptance criterion"
team: qa
claude:
  model: opus
  permission_mode: bypassPermissions
  allowed_tools: [Read, Glob, Grep, Bash, WebFetch]
  max_budget_usd: 5.00
  max_turns: 50
prompt_template: uat_api.md.j2
input_documents: [features_request, backend_spec, api_contract, sprint_plan, uat_prereqs]
output_documents: [uat_report]
qa_agent: uat_qa
constraints:
  - "Test every acceptance criterion from the features request"
  - "Drive the HTTP surface via curl/httpx through Bash — real requests, real responses"
  - "Capture request/response transcripts under .agentic-dev/uat_artifacts/<run_id>/"
  - "Assert API Contract compliance: status codes, response schemas, error envelope shape"
  - "Include pass/fail status and concrete evidence per AC; vague language will be flagged"

name: drift_detector_qa
description: "Reviews drift report for completeness, correct categorization, and no false negatives"
team: onboarding
claude:
  model: opus
  permission_mode: plan
  allowed_tools: [Read, Glob, Grep]
  max_turns: 10
  max_budget_usd: 2.00
prompt_template: drift_detector_qa.md.j2
input_documents: [drift_report, spec_documents, code_snapshots]
output_documents: [drift_detector_qa_report]
qa_agent: null
constraints:
  - "Evaluate: are all drift items correctly categorized?"
  - "Evaluate: are [DRIFT-nnn] IDs sequential with no gaps?"
  - "Check for obvious false negatives by spot-checking specs against code"
  - "Check for false positives where code and spec actually agree"
  - "Verify file paths and spec references are accurate"

name: uat_desktop_electron
description: "Runtime-drives an Electron desktop app via Playwright (CDP) to verify acceptance criteria"
team: qa
claude:
  model: opus
  permission_mode: bypassPermissions
  allowed_tools:
    - Read
    - Glob
    - Grep
    - Bash
    - Monitor
    - WebFetch
    - "mcp__plugin_playwright_playwright__*"
  max_budget_usd: 5.00
  max_turns: 100
prompt_template: uat_desktop_electron.md.j2
input_documents: [features_request, frontend_spec, backend_spec, api_contract, sprint_plan, uat_prereqs]
output_documents: [uat_report]
qa_agent: uat_qa
constraints:
  - "Test every acceptance criterion from the features request"
  - "Boot the Electron app in dev mode and attach Playwright via the CDP endpoint"
  - "Drive real UI flows; capture screenshots and transcripts under .agentic-dev/uat/<run_id>/evidence/<track>/"
  - "Exercise IPC between main and renderer where features depend on it"
  - "Include pass/fail status and concrete evidence per AC; vague language will be flagged"

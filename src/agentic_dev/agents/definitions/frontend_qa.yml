name: frontend_qa
description: "Reviews frontend code against spec requirements, tests, and security"
team: frontend
claude:
  model: opus
  permission_mode: bypassPermissions
  allowed_tools: [Read, Glob, Grep, Bash]
  max_budget_usd: 2.00
  max_turns: 25
prompt_template: frontend_qa.md.j2
input_documents: [frontend_spec, api_contract, sprint_plan]
output_documents: [frontend_qa_report]
working_directory: frontend
qa_agent: null
constraints:
  - "Review code against frontend spec requirements"
  - "Verify tests exist and are meaningful"
  - "Check for security vulnerabilities (XSS, injection)"
  - "Check for obvious scaling issues"
  - "Verify CI/CD pipeline is maintained"
  - "Verify project documentation (README.md, ARCHITECTURE.md) is present, accurate, and up-to-date with the current sprint's changes"

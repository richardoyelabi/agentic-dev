name: frontend_developer
description: "Implements frontend code per sprint using the frontend spec and API contract"
team: frontend
claude:
  model: opus
  permission_mode: bypassPermissions
  allowed_tools: [Bash, Read, Edit, Write, Glob, Grep, WebFetch, WebSearch]
  max_budget_usd: 5.00
  max_turns: 150
prompt_template: frontend_developer.md.j2
input_documents: [frontend_spec, api_contract, sprint_plan]
output_documents: []
working_directory: frontend
qa_agent: frontend_qa
constraints:
  - "Implement only the features scoped to the current sprint"
  - "Follow the tech stack from the frontend spec"
  - "Write tests for all components"
  - "Maintain GitHub Actions CI/CD pipeline"
  - "Handle all error states graciously — every API call, user interaction, and async operation must have explicit error handling with user-friendly feedback"
  - "Write and maintain project documentation (README.md and ARCHITECTURE.md) covering features implemented in the current sprint"

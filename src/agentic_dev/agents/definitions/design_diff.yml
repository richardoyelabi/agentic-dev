name: design_change_detection
description: "Detects design changes by comparing live Figma state against existing specs"
team: design_architecture
claude:
  model: sonnet
  permission_mode: bypassPermissions
  allowed_tools: ["Read", "Glob", "Grep"]
prompt_template: design_change_detection.md.j2
input_documents: [frontend_spec, figma_sources]
output_documents: [design_changes]
qa_agent: null
constraints:
  - "Use Figma MCP tools to inspect current design state"
  - "Compare against the existing Frontend Spec"
  - "Only report actual structural or visual design changes"
  - "Do not report phrasing or formatting differences"
  - "Include old and new values where applicable"
  - "Output NO_DESIGN_CHANGES if nothing changed"

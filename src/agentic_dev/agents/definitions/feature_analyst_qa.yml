name: feature_analyst_qa
description: "Reviews Features Request for completeness, testability, and correctness"
team: design_architecture
claude:
  model: sonnet
  permission_mode: bypassPermissions
  allowed_tools: []
prompt_template: feature_analyst_qa.md.j2
input_documents: [structured_input, features_request]
output_documents: [feature_analyst_qa_report]
qa_agent: null
constraints:
  - "Evaluate: does it cover all features from structured input?"
  - "Evaluate: are acceptance criteria testable?"
  - "Evaluate: are dependencies correctly identified?"
  - "Check for security vulnerabilities in feature design"
  - "Check for obvious scaling issues"

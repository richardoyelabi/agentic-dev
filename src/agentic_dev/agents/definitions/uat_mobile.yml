name: uat_mobile
description: "Runtime-drives a mobile app via Maestro (primary) or the project's integration test runner"
team: qa
claude:
  model: opus
  permission_mode: bypassPermissions
  allowed_tools: [Read, Glob, Grep, Bash, Monitor, WebFetch]
  max_budget_usd: 5.00
  max_turns: 100
  figma_mcp: true
prompt_template: uat_mobile.md.j2
input_documents: [features_request, frontend_spec, backend_spec, api_contract, sprint_plan, uat_prereqs, bootstrap, env_requirements, figma_sources, figma_annotations]
output_documents: [uat_report]
qa_agent: uat_qa
constraints:
  - "Test every acceptance criterion from the features request"
  - "Drive via Maestro when available; fall back to project's integration_test (Flutter) or detox/Expo runner"
  - "Require a running emulator/simulator; do not fabricate device interactions"
  - "Capture Maestro run outputs and screenshots under .agentic-dev/uat/<run_id>/evidence/<track>/"
  - "Include pass/fail status and concrete evidence per AC; vague language will be flagged"
